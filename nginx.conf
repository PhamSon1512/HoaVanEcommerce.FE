events{}
http {
    include /etc/nginx/mime.types;
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;
        
        # Cấu hình nén
        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- PHẦN QUAN TRỌNG NHẤT: Cấu hình nối sang Backend Azure ---
        location /api/ {
            # Dùng DNS Google để tìm địa chỉ Backend
            resolver 8.8.8.8;
            
            # Địa chỉ Backend bạn vừa gửi (Lưu ý: https và dấu / ở cuối)
            proxy_pass https://hoavan-backend-b5bqedf0gnavf0h6.eastasia-01.azurewebsites.net;
            
            # Các cấu hình bắt buộc khi proxy sang HTTPS
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host hoavan-backend-b5bqedf0gnavf0h6.eastasia-01.azurewebsites.net;
        }
    }
}